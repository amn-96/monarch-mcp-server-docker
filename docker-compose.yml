services:
  monarch-mcp:
    image: ghcr.io/amn-96/monarch-mcp-server-docker:latest
    volumes:
      # Persist the keyring credentials
      - monarch-data:/app/data
    # Required for interactive prompts if running interactive commands via compose up
    stdin_open: true
    tty: true

  monarch-mcp-sse:
    image: ghcr.io/amn-96/monarch-mcp-server-docker:latest
    volumes:
      - monarch-data:/app/data
    environment:
      - MCP_TRANSPORT=sse
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8000
    ports:
      - "8000:8000"

volumes:
  monarch-data:
